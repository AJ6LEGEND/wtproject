<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mumbai Portal - Citizen Reports</title>
    <link rel="stylesheet" href="1.css">
</head>
<body>
    <nav>
        <a href="1.html">Home</a>
        <a href="2.html">About Us</a>
        <a href="3.html">Contact</a>
        <a href="weather.html">Weather</a>
        <a href="reports.html">Reports</a>
        <a href="games.html">Games</a>
        <a href="settings.html">Settings</a>
    </nav>

    <div class="container">
        <h2>Report a Civic Issue</h2>
        <p style="margin-bottom: 2rem;">Help us keep Mumbai clean and safe. Submit an issue directly to the BMC.</p>

        <form class="basic-form" id="reportForm">
            <label>Issue Category</label>
            <select id="category" required>
                <option value="">-- Select Category --</option>
                <option value="pothole">Pothole</option>
                <option value="garbage">Garbage / Solid Waste</option>
                <option value="streetlight">Broken Streetlight</option>
                <option value="water">Water Leakage</option>
                <option value="other">Other</option>
            </select>

            <label>Location (Area / Landmark)</label>
            <input type="text" placeholder="e.g. S.V. Road, near Borivali Station" required>

            <label>Description</label>
            <textarea rows="4" placeholder="Describe the issue in detail..." required></textarea>

            <label>Upload Photo (JPG/PNG)</label>
            <input type="file" accept=".jpg, .jpeg, .png">

            <button type="submit" class="btn-primary">Submit Report</button>
        </form>

        <div class="ticket-msg" id="ticketMsg" style="display:none;">
            <h3>✅ Report Submitted!</h3>
            <p>Your tracking ticket number is: <strong id="ticketNum"></strong></p>
            <p style="font-size: 0.9rem; margin-top: 0.5rem;">Please save this number for future reference.</p>
        </div>
    </div>

    <script>
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            this.style.display = 'none';
            // Generate a fake ticket number (e.g. BMC-84729)
            const randomId = Math.floor(Math.random() * 90000) + 10000;
            document.getElementById('ticketNum').textContent = 'BMC-' + randomId;
            document.getElementById('ticketMsg').style.display = 'block';
        });

        const currentPage = window.location.pathname.split('/').pop() || 'reports.html';
        document.querySelectorAll('nav a').forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.style.textDecoration = 'underline';
                link.style.opacity = '0.75';
            }
        });
    </script>
</body>
</html>
